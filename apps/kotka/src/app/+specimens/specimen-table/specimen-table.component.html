<kui-main-content title="Search specimens" containerClass="container-fluid">
  <kui-document-datatable
    style="height: calc(100vh - 255px)"
    [dataType]="dataType"
    [columns]="columns"
    [dataTypeName]="'specimen'"
    [enableFileExport]="true"
    [enableColumnSelection]="true"
    [extraSortModel]="[{
      colId: 'dateCreated',
      sort:  'desc'
    }, {
      colId: 'id',
      sort:  'desc'
    }]"
    (loadData)="onDataLoad($event)"
  >
  </kui-document-datatable>
</kui-main-content>
