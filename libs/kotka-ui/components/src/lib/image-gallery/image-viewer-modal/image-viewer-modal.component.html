<div class="image-viewer" (keydown)="onKeydown($event)" tabindex="0">
  <div class="viewer-header">
    <div class="image-info text-light">
      @if (images().length > 1) {
        <span>{{ currentIndex() + 1 }} / {{ images().length }}</span>
      }
      @if (currentImage()?.intellectualOwner) {
        <span>&copy; {{ currentImage()?.intellectualOwner }}</span>
      }
    </div>
    <div class="viewer-controls">
      <button class="btn btn-sm btn-outline-light" (click)="zoomIn()" title="Zoom in">
        <i class="fa fa-magnifying-glass-plus"></i>
      </button>
      <button class="btn btn-sm btn-outline-light" (click)="zoomOut()" title="Zoom out">
        <i class="fa fa-magnifying-glass-minus"></i>
      </button>
      <button class="btn btn-sm btn-outline-light" (click)="resetZoom()" title="Reset zoom">
        <i class="fa fa-home"></i>
      </button>
      <a class="btn btn-sm btn-outline-light ms-2" [href]="currentImage()?.originalURL" [download]="currentImage()?.originalFilename || ''" title="Download file">
        <i class="fa fa-download"></i>
      </a>
      <button class="btn btn-sm btn-outline-light ms-2" (click)="close()" title="Close">
        <i class="fa fa-xmark"></i>
      </button>
    </div>
  </div>

  <div class="viewer-body" (click)="onBackdropClick($event)">
    @if (images().length > 1) {
      <button class="nav-btn nav-btn-prev text-light" (click)="prev()" title="Previous image">
        <i class="fa fa-angle-left"></i>
      </button>
    }

    <div #osdContainer class="osd-container"></div>

    @if (images().length > 1) {
      <button class="nav-btn nav-btn-next text-light" (click)="next()" title="Next image">
        <i class="fa fa-angle-right"></i>
      </button>
    }
  </div>
</div>
