@for (toast of (toastService.toasts$ | async); track toast) {
  <ngb-toast
    [class]="toast.className"
    [autohide]="toast.autoHide ?? true"
    [delay]="toast.delay || 5000"
    (hidden)="toastService.remove(toast)"
    data-cy="toast"
    >
    <div class="d-flex">
      <div class="me-auto">
        @if (asTemplate(toast.textOrTpl); as template) {
          <ng-template [ngTemplateOutlet]="template"></ng-template>
        } @else {
          {{ toast.textOrTpl }}
        }
      </div>
      <button type="button" aria-label="Close" class="btn-close" (click)="toastService.remove(toast)" data-cy="toast-close"></button>
    </div>
  </ngb-toast>
}
