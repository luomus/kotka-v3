<div class="form-footer bg-secondary" style="--bs-bg-opacity: 0.75">
  <div class="d-grid gap-2 d-sm-flex">
    <button
      class="btn btn-success col-lg-2 col-sm-3 col-xs-12"
      type="submit"
      (click)="saveForm.emit()"
      [disabled]="disabled() || hasOnlyWarnings()"
      data-cy="form-submit"
      >
      Save & keep editing
    </button>
    @if (hasOnlyWarnings()) {
      <button
        type="button"
        class="btn btn-light col-lg-2 col-sm-3 col-xs-12"
        (click)="highlightErrors.emit()"
        >
        Check the warnings
      </button>
    }
    @if (showCopyButton()) {
      @if (hasChanges() && !disabled()) {
        <button
          class="btn btn-light col-lg-2 col-sm-3 col-xs-12"
          type="submit"
          (click)="saveAndCopyForm.emit()"
          >
          Save & copy as new
        </button>
      } @else {
        <button
          class="btn btn-light col-lg-2 col-sm-3 col-xs-12"
          type="submit"
          (click)="copyForm.emit()"
          >
          Copy as new record
        </button>
      }
    }
    @if (showDeleteButton()) {
      <button
        class="btn btn-danger col-lg-1 col-sm-2 col-xs-12"
        type="submit"
        (click)="delete.emit()"
        [disabled]="disabled()"
        data-cy="form-delete"
        >
        Delete
      </button>
    }
    @if (customButtonsTpl(); as tpl) {
      <ng-container *ngTemplateOutlet="tpl"></ng-container>
    }
  </div>
</div>
